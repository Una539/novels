<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>终焉与始源</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="description" content="《终焉与始源》——在终结与新生之间，选择守护而非毁灭">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --theme-color: #3a5a7c;
      --theme-color-light: #5a7a9c;
      --text-color: #2c3e50;
      --sidebar-width: 280px;
    }
    body {
      font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
      line-height: 1.9;
      color: var(--text-color);
    }
    .sidebar {
      background: linear-gradient(180deg, #f8f9fa 0%, #f0f2f5 100%);
    }
    .sidebar-nav a {
      font-size: 14px;
      color: #444;
      transition: all 0.2s;
    }
    .sidebar-nav a:hover {
      color: var(--theme-color);
    }
    .sidebar-nav li.active > a {
      color: var(--theme-color);
      font-weight: 600;
      border-right: 3px solid var(--theme-color);
    }
    .markdown-section {
      max-width: 800px;
      padding: 40px 50px;
    }
    .markdown-section h1 {
      font-size: 2.2em;
      font-weight: 700;
      color: #1a2a3a;
      border-bottom: 2px solid var(--theme-color);
      padding-bottom: 0.3em;
      margin-top: 0;
    }
    .markdown-section h2 {
      font-size: 1.6em;
      color: #2a3a4a;
      margin-top: 2em;
      border-left: 4px solid var(--theme-color);
      padding-left: 12px;
    }
    .markdown-section h3 {
      font-size: 1.3em;
      color: #3a4a5a;
    }
    .markdown-section p {
      text-align: justify;
      text-indent: 2em;
      margin: 1em 0;
    }
    /* 特殊段落不缩进 */
    .markdown-section blockquote p,
    .markdown-section li p,
    .markdown-section h1 + p,
    .markdown-section h2 + p,
    .markdown-section h3 + p,
    .markdown-section table + p,
    .markdown-section p:first-child {
      text-indent: 0;
    }
    .markdown-section blockquote {
      border-left: 4px solid var(--theme-color-light);
      background: #f8f9fa;
      padding: 1em 1.5em;
      color: #555;
      font-style: italic;
    }
    .markdown-section table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5em 0;
    }
    .markdown-section th {
      background: var(--theme-color);
      color: white;
      padding: 10px 14px;
      text-align: left;
    }
    .markdown-section td {
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0e0;
    }
    .markdown-section tr:nth-child(even) {
      background: #f8f9fa;
    }
    .app-name-link {
      font-size: 1.3em !important;
      font-weight: 700;
      color: var(--theme-color) !important;
      letter-spacing: 2px;
    }
    .cover-main > h1 {
      font-size: 3em !important;
      letter-spacing: 6px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }
    .cover-main blockquote {
      font-size: 1.1em;
      color: #666;
      border: none;
      background: none;
    }
    .cover-main a {
      border-radius: 30px !important;
      padding: 0.6em 2.5em !important;
    }
    .sidebar-toggle {
      background: rgba(255,255,255,0.9);
    }
    /* 卷标样式 */
    .volume-label {
      display: inline-block;
      background: var(--theme-color);
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.75em;
      margin-right: 6px;
      vertical-align: middle;
    }
    .volume-1 { background: #3a5a7c; }
    .volume-2 { background: #7c3a5a; }
    .volume-3 { background: #5a7c3a; }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '终焉与始源',
      repo: 'https://github.com/Una539/novels',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: false,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      subMaxLevel: 2,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索章节、角色、设定...',
        noData: '未找到相关内容',
        depth: 3,
        hideOtherSidebarContent: false
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true
      },
      plugins: [
        function(hook, vm) {
          hook.beforeEach(function(content) {
            return content;
          });
          hook.afterEach(function(html, next) {
            var div = document.createElement('div');
            div.innerHTML = html;
            var paragraphs = div.querySelectorAll('p');
            paragraphs.forEach(function(p) {
              var parent = p.parentElement;
              var prev = p.previousElementSibling;
              if (parent && parent.tagName === 'BLOCKQUOTE') return;
              if (parent && (parent.tagName === 'LI' || parent.tagName === 'UL' || parent.tagName === 'OL')) return;
              if (prev && /^H[1-6]$/.test(prev.tagName)) return;
              if (prev && prev.tagName === 'TABLE') return;
              if (!prev && p === p.parentElement.querySelector('p:first-child')) return;
              if (p.style.textIndent) return;
              p.style.textIndent = '2em';
            });
            next(div.innerHTML);
          });
        }
      ]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
</body>
</html>
